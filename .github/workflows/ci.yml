name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >
          --health-cmd "curl -f http://localhost:6333/api/v1/collections || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:latest
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run ruff
        run: python -m ruff check .
      - name: Run mypy
        run: python -m mypy app
      - name: Run tests
        env:
          DRY_RUN: true
          QDRANT_URL: http://localhost:6333
          REDIS_URL: redis://localhost:6379/0
        run: python -m pytest -q
